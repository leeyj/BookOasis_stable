<div class="aladin-plugin-panel">
  <div class="aladin-plugin-title">알라딘 플러그인 전용 설정</div>
  <div class="aladin-plugin-desc">알라딘 OpenAPI TTBKey를 입력하면 수동 메타데이터 검색과 적용 기능이 동작합니다.</div>

  <div class="aladin-plugin-field">
    <label for="aladin-ttbkey">알라딘 OpenAPI TTBKey <span class="req">*</span></label>
    <input id="aladin-ttbkey" type="text" name="ALADIN" required placeholder="예: ttbabcdef123456" />
    <p class="hint">알라딘 OpenAPI에서 발급받은 키를 입력하세요.</p>
  </div>
</div>
