<!-- 우클릭 커스텀 컨텍스트 메뉴 -->
<div id="library-context-menu" class="context-menu" style="display: none;">
    <ul class="context-menu-list">
        <li class="context-menu-item" id="ctx-scan-category" onclick="triggerScanLibrary(false)"><i class="fa-solid fa-rotate" style="color: #a855f7;"></i> 지금 스캔</li>
        <li class="context-menu-item" id="ctx-force-scan-category" onclick="triggerScanLibrary(true)"><i class="fa-solid fa-arrows-rotate" style="color: #ea580c;"></i> 강제 재스캔 (전체)</li>
        <li class="context-menu-item" id="ctx-scan-covers-category" onclick="triggerScanLibraryCovers()"><i class="fa-solid fa-image" style="color: #3b82f6;"></i> 표지 새로고침</li>
        <li class="context-menu-item" id="ctx-cancel-scan-category" onclick="triggerCancelScanLibrary()"><i class="fa-solid fa-circle-stop" style="color: #ef4444;"></i> 스캔 중단</li>
        <li class="context-menu-item" id="ctx-add-category" onclick="triggerAddLibrary()"><i class="fa-solid fa-plus"></i> 새 카테고리 추가</li>
        <li class="context-menu-item" id="ctx-edit-category" onclick="triggerEditLibrary()"><i class="fa-solid fa-pen-to-square"></i> 카테고리 수정</li>
        <li class="context-menu-item" id="ctx-delete-category" onclick="triggerDeleteLibrary()"><i class="fa-solid fa-trash-can"></i> 카테고리 삭제</li>
    </ul>
</div>

<!-- 개별 도서 우클릭 커스텀 컨텍스트 메뉴 -->
<div id="book-context-menu" class="context-menu" style="display: none;">
    <ul class="context-menu-list">
        <li class="context-menu-item" id="ctx-scan-book" onclick="triggerScanSingleBook()"><i class="fa-solid fa-barcode" style="color: #a855f7;"></i> 이 책 즉시 스캔 (표지/메타)</li>
        <li class="context-menu-item" id="ctx-search-meta-book" onclick="triggerSearchAladinMetadata()"><i class="fa-solid fa-magnifying-glass" style="color: #3b82f6;"></i> 메타정보 검색</li>
    </ul>
</div>
