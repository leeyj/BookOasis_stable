<!-- 우클릭 커스텀 컨텍스트 메뉴 -->
<div id="library-context-menu" class="context-menu" style="display: none;">
    <ul class="context-menu-list">
        <li class="context-menu-item" id="ctx-scan-category" onclick="triggerScanLibrary(false)"><i class="fa-solid fa-rotate" style="color: #a855f7;"></i> <span data-i18n="context_menu.scan_now">지금 스캔</span></li>
        <li class="context-menu-item" id="ctx-force-scan-category" onclick="triggerScanLibrary(true)"><i class="fa-solid fa-arrows-rotate" style="color: #ea580c;"></i> <span data-i18n="context_menu.force_rescan">강제 재스캔 (전체)</span></li>
        <li class="context-menu-item" id="ctx-scan-covers-category" onclick="triggerScanLibraryCovers()"><i class="fa-solid fa-image" style="color: #3b82f6;"></i> <span data-i18n="context_menu.refresh_cover">표지 새로고침</span></li>
        <li class="context-menu-item" id="ctx-cancel-scan-category" onclick="triggerCancelScanLibrary()"><i class="fa-solid fa-circle-stop" style="color: #ef4444;"></i> <span data-i18n="context_menu.cancel_scan">스캔 중단</span></li>
        <li class="context-menu-item" id="ctx-add-category" onclick="triggerAddLibrary()"><i class="fa-solid fa-plus"></i> <span data-i18n="context_menu.add_category">새 카테고리 추가</span></li>
        <li class="context-menu-item" id="ctx-edit-category" onclick="triggerEditLibrary()"><i class="fa-solid fa-pen-to-square"></i> <span data-i18n="context_menu.edit_category">카테고리 수정</span></li>
        <li class="context-menu-item" id="ctx-delete-category" onclick="triggerDeleteLibrary()"><i class="fa-solid fa-trash-can"></i> <span data-i18n="context_menu.delete_category">카테고리 삭제</span></li>
    </ul>
</div>

<!-- 개별 도서 우클릭 커스텀 컨텍스트 메뉴 -->
<div id="book-context-menu" class="context-menu" style="display: none;">
    <div class="context-menu-header">
        <span class="context-menu-title">도서 메뉴</span>
        <button type="button" class="context-menu-close-btn" onclick="event.stopPropagation(); if (window.closeBookContextMenu) window.closeBookContextMenu();" aria-label="닫기"><span class="context-menu-close-icon">&times;</span><span class="context-menu-close-text">닫기</span></button>
    </div>
    <ul class="context-menu-list">
        <li class="context-menu-item" id="ctx-scan-book" onclick="triggerScanSingleBook()"><i class="fa-solid fa-barcode" style="color: #a855f7;"></i> <span data-i18n="context_menu.scan_book_now">이 책 즉시 스캔 (표지/메타)</span></li>
        <li class="context-menu-item" id="ctx-search-meta-book" onclick="triggerSearchAladinMetadata()"><i class="fa-solid fa-magnifying-glass" style="color: #3b82f6;"></i> <span data-i18n="context_menu.search_metadata">메타정보 검색</span></li>
        <li class="context-menu-item" id="ctx-unread-book" onclick="triggerMarkAsUnread()"><i class="fa-solid fa-eye-slash" style="color: #ef4444;"></i> <span data-i18n="context_menu.mark_as_unread">읽지 않은 상태로 변경 (0%)</span></li>
        <li class="context-menu-item context-menu-close-item" onclick="if (window.closeBookContextMenu) window.closeBookContextMenu();"><i class="fa-solid fa-xmark" style="color: #f87171;"></i> <span>닫기</span></li>
    </ul>
</div>

<!-- 스케줄 작업용 컨텍스트 메뉴 -->
<div id="schedule-action-context-menu" class="context-menu" style="display: none; min-width: 200px;">
    <div class="context-menu-header" style="padding: 0.35rem 0.85rem 0.55rem 0.85rem; border-bottom: 1px solid rgba(255,255,255,0.05); display: flex; justify-content: space-between; align-items: center; gap: 0.5rem;">
        <span class="context-menu-title" style="font-size: 0.82rem; color: #94a3b8; font-weight: normal;"><i class="fa-solid fa-clock"></i> <span data-i18n="settings.col_last_scan">최근 스캔 시각</span></span>
        <span id="schedule-action-last-scan" style="font-size: 0.82rem; color: #cbd5e1; font-family: monospace;">-</span>
    </div>
    <ul class="context-menu-list">
        <li class="context-menu-item" id="schedule-action-scan"><i class="fa-solid fa-play" style="color: #a855f7;"></i> <span data-i18n="settings.btn_scan">스캔</span></li>
        <li class="context-menu-item" id="schedule-action-force"><i class="fa-solid fa-arrows-rotate" style="color: #ea580c;"></i> <span data-i18n="settings.btn_force_scan">강제 스캔</span></li>
        <li class="context-menu-item context-menu-close-item" id="schedule-action-close"><i class="fa-solid fa-xmark" style="color: #f87171;"></i> <span data-i18n="common.close">닫기</span></li>
    </ul>
</div>
