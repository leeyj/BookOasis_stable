<!-- 사용자 수동 등록 모달 -->
<div id="user-form-modal" class="library-modal" style="display: none;">
    <div class="library-modal-content" style="max-width: 400px;">
        <div class="library-modal-header">
            <h3><span data-i18n="modal.add_user">사용자 추가</span></h3>
            <span class="library-modal-close" onclick="closeUserModal()">&times;</span>
        </div>
        <form id="user-crud-form" onsubmit="submitUserForm(event)">
            <div class="library-form-group">
                <label for="user-form-username" data-i18n="modal.username_label">사용자 아이디 (로그인용)</label>
                <input type="text" id="user-form-username" name="username" required data-i18n-placeholder="modal.username_placeholder" placeholder="예: reading_fan">
            </div>
            <div class="library-form-group">
                <label for="user-form-password" data-i18n="modal.password_label">초기 비밀번호 (최소 4자)</label>
                <input type="password" id="user-form-password" name="password" required data-i18n-placeholder="modal.password_placeholder" placeholder="예: user1234">
            </div>
            <div class="library-form-group">
                <label for="user-form-role" data-i18n="modal.role_label">권한 역할 (Role)</label>
                <select id="user-form-role" name="role" style="width: 100%; background: rgba(15, 23, 42, 0.6); border: 1px solid rgba(255, 255, 255, 0.1); color: #fff; padding: 0.6rem 0.8rem; border-radius: 6px; outline: none; cursor: pointer; font-size: 0.9rem;">
                    <option value="user" data-i18n="modal.role_user">일반 사용자 (user)</option>
                    <option value="admin" data-i18n="modal.role_admin">관리자 (admin)</option>
                </select>
            </div>
            <div class="library-form-group" style="display: flex; align-items: center; gap: 0.5rem; margin-top: 0.5rem;">
                <input type="checkbox" id="user-form-adult-access" name="has_adult_access" checked style="width: auto; cursor: pointer; accent-color: #a855f7;">
                <label for="user-form-adult-access" style="cursor: pointer; margin: 0; font-size: 0.9rem;">성인 도서 접근 허용</label>
            </div>
            <div class="library-modal-footer">
                <button type="button" class="btn-cancel" onclick="closeUserModal()" data-i18n="common.cancel">취소</button>
                <button type="submit" class="btn-submit" id="user-form-submit-btn" data-i18n="common.save">등록</button>
            </div>
        </form>
    </div>
</div>

<!-- 사용자 비밀번호 강제 재설정 모달 (일반 사용자용) -->
<div id="user-reset-pwd-modal" class="library-modal" style="display: none;">
    <div class="library-modal-content" style="max-width: 400px;">
        <div class="library-modal-header">
            <h3><span data-i18n="modal.reset_pwd_title">비밀번호 강제 재설정</span></h3>
            <span class="library-modal-close" onclick="closeResetPwdModal()">&times;</span>
        </div>
        <form id="user-reset-pwd-form" onsubmit="submitResetPwdForm(event)">
            <input type="hidden" id="reset-pwd-user-id" name="user_id">
            <input type="hidden" id="reset-pwd-role" name="role" value="user">
            <p style="margin: 0 0 0.8rem 0; padding: 0.65rem 0.75rem; border-radius: 6px; background: rgba(245, 158, 11, 0.12); border: 1px solid rgba(245, 158, 11, 0.35); color: #fcd34d; font-size: 0.82rem; line-height: 1.45;">
                <i class="fa-solid fa-circle-info" style="margin-right: 0.35rem;"></i>
                <span data-i18n="modal.reset_pwd_help">이 기능은 사용자 비밀번호를 초기 비밀번호로 다시 설정합니다. 다음 로그인 시 사용자에게 비밀번호를 변경하도록 안내해 주세요.</span>
            </p>
            <div class="library-form-group">
                <label for="reset-pwd-new" data-i18n="modal.new_password_label">새 비밀번호 (최소 4자)</label>
                <input type="password" id="reset-pwd-new" name="new_password" required data-i18n-placeholder="modal.new_password_placeholder" placeholder="새 비밀번호 입력">
            </div>
            <div class="library-modal-footer">
                <button type="button" class="btn-cancel" onclick="closeResetPwdModal()" data-i18n="common.cancel">취소</button>
                <button type="submit" class="btn-submit" data-i18n="common.save">저장</button>
            </div>
        </form>
    </div>
</div>

<!-- 관리자 비밀번호 변경 모달 (관리자용) -->
<div id="admin-change-pwd-modal" class="library-modal" style="display: none;">
    <div class="library-modal-content" style="max-width: 400px;">
        <div class="library-modal-header">
            <h3><span data-i18n="modal.change_pwd_title">관리자 비밀번호 변경</span></h3>
            <span class="library-modal-close" onclick="closeAdminChangePwdModal()">&times;</span>
        </div>
        <form id="admin-change-pwd-form" onsubmit="submitAdminChangePwdForm(event)">
            <input type="hidden" id="change-pwd-admin-id" name="user_id">
            <input type="hidden" id="change-pwd-role" name="role" value="admin">
            <div class="library-form-group">
                <label for="change-pwd-current" data-i18n="modal.current_password_label">현재 비밀번호</label>
                <input type="password" id="change-pwd-current" name="current_password" required data-i18n-placeholder="modal.current_password_placeholder" placeholder="해당 관리자 계정의 현재 비밀번호 입력">
            </div>
            <div class="library-form-group">
                <label for="change-pwd-new" data-i18n="modal.new_password_label">새 비밀번호 (최소 4자)</label>
                <input type="password" id="change-pwd-new" name="new_password" required data-i18n-placeholder="modal.new_password_placeholder" placeholder="새 비밀번호 입력">
            </div>
            <div class="library-modal-footer">
                <button type="button" class="btn-cancel" onclick="closeAdminChangePwdModal()" data-i18n="common.cancel">취소</button>
                <button type="submit" class="btn-submit" data-i18n="common.save">저장</button>
            </div>
        </form>
    </div>
</div>
