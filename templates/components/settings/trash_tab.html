<!-- 4.5 삭제 관리 (휴지통) 탭 -->
<div id="settings-tab-trash" class="settings-tab-content" style="display: none; flex-direction: column; gap: 1rem;">
    <div class="trash-header-container" style="display: flex; justify-content: space-between; align-items: center; background: rgba(255, 255, 255, 0.03); border: 1px solid rgba(255, 255, 255, 0.06); padding: 0.75rem 1rem; border-radius: 8px;">
        <div style="display: flex; align-items: center; gap: 0.75rem;">
            <label style="font-size: 0.875rem; color: #94a3b8; font-weight: 500;">DB 선택:</label>
            <select id="trash-db-type" onchange="loadTrashList()" style="background: #1e293b; border: 1px solid rgba(255, 255, 255, 0.1); color: #f8fafc; padding: 0.35rem 1.5rem 0.35rem 0.75rem; border-radius: 6px; font-size: 0.875rem; outline: none; cursor: pointer;">
                <option value="general">일반 도서 DB</option>
                <option value="adult">성인 도서 DB</option>
            </select>
        </div>
        <div class="trash-header-buttons" style="display: flex; gap: 0.5rem;">
            <button class="btn btn-secondary" onclick="restoreSelectedTrash()" style="display: flex; align-items: center; gap: 0.35rem; padding: 0.4rem 0.8rem; font-size: 0.825rem; border-radius: 6px;">
                <i class="fa-solid fa-rotate-left"></i> 선택 복구
            </button>
            <button class="btn btn-danger-outline" onclick="deleteSelectedTrash()" style="display: flex; align-items: center; gap: 0.35rem; padding: 0.4rem 0.8rem; font-size: 0.825rem; border-radius: 6px;">
                <i class="fa-solid fa-trash"></i> 선택 삭제
            </button>
            <button class="btn btn-danger" onclick="emptyTrashAll()" style="display: flex; align-items: center; gap: 0.35rem; padding: 0.4rem 0.8rem; font-size: 0.825rem; border-radius: 6px; background: #ef4444; border: none;">
                <i class="fa-solid fa-dumpster-fire"></i> 휴지통 비우기
            </button>
        </div>
    </div>

    <!-- 삭제 감지 목록 테이블 -->
    <div class="settings-table-wrapper" style="flex: 1; border: 1px solid rgba(255, 255, 255, 0.06); border-radius: 8px; overflow-x: auto; background: rgba(30, 41, 59, 0.2); backdrop-filter: blur(10px);">
        <div style="max-height: 450px; overflow-y: auto;">
            <table class="settings-table" style="width: 100%; border-collapse: collapse; text-align: left; font-size: 0.875rem; color: #cbd5e1;">
                <thead>
                    <tr style="background: rgba(255, 255, 255, 0.02); border-bottom: 1px solid rgba(255, 255, 255, 0.06); position: sticky; top: 0; z-index: 1;">
                        <th style="padding: 0.75rem 1rem; width: 40px; text-align: center;">
                            <input type="checkbox" id="trash-select-all" onchange="toggleAllTrashCheckboxes(this)" style="cursor: pointer; width: 15px; height: 15px; accent-color: #3b82f6;">
                        </th>
                        <th style="padding: 0.75rem 1rem; font-weight: 600; color: #94a3b8;">도서명</th>
                        <th style="padding: 0.75rem 1rem; font-weight: 600; color: #94a3b8;">원래 경로</th>
                        <th style="padding: 0.75rem 1rem; font-weight: 600; color: #94a3b8; width: 130px;">카테고리</th>
                        <th style="padding: 0.75rem 1rem; font-weight: 600; color: #94a3b8; width: 160px;">감지 시각</th>
                        <th style="padding: 0.75rem 1rem; font-weight: 600; color: #94a3b8; width: 120px; text-align: center;">제어</th>
                    </tr>
                </thead>
                <tbody id="trash-list-body">
                    <!-- Dynamic rendering via settings_trash.js -->
                </tbody>
            </table>
            <div id="trash-empty-state" style="display: none; padding: 3rem 1rem; text-align: center; color: #64748b;">
                <i class="fa-solid fa-trash-arrow-up" style="font-size: 2.5rem; margin-bottom: 0.75rem; opacity: 0.5;"></i>
                <p style="font-size: 0.95rem; margin: 0;">휴지통이 비어있습니다.</p>
                <p style="font-size: 0.8rem; margin: 0.25rem 0 0 0; color: #475569;">스캔 도중 물리적으로 유실된 도서가 여기에 표시됩니다.</p>
            </div>
        </div>
    </div>
</div>

<script src="/static/js/settings_trash.js"></script>
