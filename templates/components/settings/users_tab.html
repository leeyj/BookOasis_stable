<!-- 5. 사용자 관리 탭 -->
<div id="settings-tab-users" class="settings-tab-content" style="display: none; flex-direction: column; gap: 1.5rem;">
    <div class="dashboard-section">
        <div class="section-header" style="margin-bottom: 1.2rem; display: flex; justify-content: space-between; align-items: flex-end; flex-wrap: wrap; gap: 1rem;">
            <div>
                <h3 class="section-title" style="margin: 0; color: #fff; font-size: 1.2rem; font-weight: 700;">
                    <i class="fa-solid fa-users" style="color: #a855f7; margin-right: 0.5rem;"></i> <span data-i18n="settings.user_title">사용자 수동 등록 및 관리</span>
                </h3>
                <p style="font-size: 0.82rem; color: #94a3b8; margin: 0.4rem 0 0 0;" data-i18n="settings.user_subtitle">비공개 계정 체계를 유지하기 위해, 새로운 독서 사용자를 어드민이 직접 등록하고 삭제를 제어합니다.</p>
            </div>
            <button class="btn-submit" onclick="openAddUserModal()" style="width: auto; padding: 0.5rem 1rem; font-size: 0.82rem; display: inline-flex; align-items: center; gap: 0.3rem;">
                <i class="fa-solid fa-user-plus"></i> <span data-i18n="settings.user_add_btn">신규 사용자 추가</span>
            </button>
        </div>
        
        <div class="settings-table-wrapper" style="background: rgba(30, 41, 59, 0.25); border: 1px solid rgba(255,255,255,0.05); border-radius: 8px; overflow: hidden; backdrop-filter: blur(10px);">
            <table class="settings-table" style="width: 100%; border-collapse: collapse; text-align: left; font-size: 0.88rem;">
                <thead>
                    <tr style="background: rgba(15, 23, 42, 0.4); border-bottom: 1px solid rgba(255,255,255,0.08); color: #94a3b8;">
                        <th style="padding: 1rem; width: 10%;" data-i18n="settings.user_col_id">ID</th>
                        <th style="padding: 1rem; width: 40%;" data-i18n="settings.user_col_username">사용자 ID</th>
                        <th style="padding: 1rem; width: 20%;" data-i18n="settings.user_col_role">역할(Role)</th>
                        <th style="padding: 1rem; width: 15%; text-align: center;" data-i18n="settings.user_col_is_default_pwd">기본 비번 여부</th>
                        <th style="padding: 1rem; width: 15%; text-align: center;" data-i18n="settings.user_col_manage">관리</th>
                    </tr>
                </thead>
                <tbody id="settings-users-list">
                    <!-- JS에 의해 동적 렌더링 -->
                </tbody>
            </table>
        </div>
    </div>
</div>
