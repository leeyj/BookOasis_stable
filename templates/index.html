<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="theme-color" content="#090d16">
    <title>BookOasis - 도서 보관함</title>
    <!-- Favicon -->
    <link rel="icon" type="image/png" href="{{ url_for('static', filename='images/logo.png') }}?sig=boe-favicon-a17f3c9">
    <!-- FontAwesome 아이콘 패키지 추가 (Local) -->
    <link rel="stylesheet" href="{{ url_for('static', filename='lib/font-awesome/css/all.min.css') }}">
    <!-- i18n 다국어 지원 엔진 -->
    <script src="{{ url_for('static', filename='js/i18n.js') }}"></script>
    <!-- Marked.js (Markdown 파서) -->
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <!-- 외부 라이브러리 (로컬 다운로드 버전) -->
    <script src="/static/lib/Sortable.min.js"></script>
    <script>
        window.currentUser = {
            username: "{{ session.get('username', '') }}",
            role: "{{ session.get('role', '') }}"
        };
        window.bookOasisConsoleLog = typeof console.log === 'function' ? console.log.bind(console) : function() {};
        
        // 🌟 VIEW_LOG 환경변수에 따른 전역 콘솔 로그 제어 (Monkey Patch)
        window.VIEW_LOG = "{{ 'true' if view_log_enabled else 'false' }}" === "true";
        if (window.VIEW_LOG !== true) {
            console.log = function() {};
            console.warn = function() {};
        }
    </script>
    <!-- 프리미엄 커스텀 CSS -->
    <!-- 미디어 라이브러리 전용 CSS (tab_media_library.html에서 로드됨) -->
    
    <style>
        :root {
            --color-accent: {{ user_theme_color|default('#a855f7') }};
            --color-accent-hover: {{ user_theme_color|default('#a855f7') }}cc;
            --bg-glow-1: {{ user_theme_color|default('#a855f7') }}33;
            --bg-glow-2: #3b82f633;
            --bookoasis-engine-mark-a17f3c9: rgba(168, 85, 247, 0.12);
            --boe-copyright-whisper-a17f3c9: rgba(148, 163, 184, 0.72);
        }

        body {
            background-image: radial-gradient(circle at 15% 50%, var(--bg-glow-1), transparent 25%),
                radial-gradient(circle at 85% 30%, var(--bg-glow-2), transparent 25%);
            background-attachment: fixed;
            background-color: #0f172a; /* Fallback for style.css var(--color-bg) */
            color: #f8fafc;
            margin: 0;
            padding: 20px;
            min-height: 100vh;
            box-sizing: border-box;
            overflow: hidden;
        }
    </style>
    <script>
        window.bookOasisConsoleLog("%c📚 Powered by BookOasis Engine v1.0", "color: #a855f7; font-size: 20px; font-weight: bold; text-shadow: 1px 1px 2px black; padding: 10px; border-radius: 5px; border: 2px solid #a855f7;");
        window.bookOasisConsoleLog("Licensed under GNU AGPLv3. https://github.com/leeyj/BookOasis_stable");
    </script>
</head>
<body>

<div class="main-wrapper">
    {% include "components/tab_media_library.html" %}
</div>

<script>
    // 페이지 로드 시 다국어 초기화 및 렌더링 실행
    document.addEventListener('DOMContentLoaded', async () => {
        await i18n.init();
        i18n.translateDOM();
        i18n.renderLanguageSelector('#settings-i18n-container');
        window.i18nReady = true;
        document.dispatchEvent(new Event('i18nReady'));
    });
</script>
</body>
</html>
