<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BookOasis - 로그인</title>
    <!-- Favicon -->
    <link rel="icon" type="image/png" href="/static/images/logo.png">
    <!-- FontAwesome -->
    <link rel="stylesheet" href="/static/lib/font-awesome/css/all.min.css">
    <link rel="stylesheet" href="/static/css/login.css">
    <!-- i18n 다국어 지원 엔진 -->
    <script src="/static/js/i18n.js"></script>
</head>
<body>


<div class="auth-container">
    <!-- 1. 로그인 폼 카드 -->
    <div id="login-card" class="auth-card">
        <div class="auth-header">
            <span class="auth-logo"><img src="/static/images/logo.png" alt="BookOasis" style="width: 4rem; height: 4rem; object-fit: contain; border-radius: 8px;"></span>
            <h2 class="auth-title" data-i18n="login.title">BookOasis</h2>
            <p class="auth-subtitle" data-i18n="login.subtitle">북오아시스 미디어 서재 로그인</p>
        </div>

        <div id="login-error" class="error-message">
            <i class="fa-solid fa-circle-exclamation"></i> <span id="login-error-text" data-i18n="common.error">오류</span>
        </div>

        <form id="login-form" onsubmit="handleLogin(event)">
            <div class="form-group">
                <input type="text" id="username" class="form-control" data-i18n-placeholder="login.username_placeholder" placeholder="아이디" required autocomplete="username">
                <i class="fa-solid fa-user"></i>
            </div>
            <div class="form-group">
                <input type="password" id="password" class="form-control" data-i18n-placeholder="login.password_placeholder" placeholder="비밀번호" required autocomplete="current-password">
                <i class="fa-solid fa-lock"></i>
            </div>
            <button type="submit" class="btn-submit">
                <span data-i18n="login.submit_btn">로그인</span> <i class="fa-solid fa-arrow-right"></i>
            </button>
        </form>
        <!-- 다국어 선택기 (로그인 버튼 아래로 이동) -->
        <div id="login-i18n-container" style="margin-top: 1.5rem; display: flex; justify-content: center;"></div>
    </div>

    <!-- 2. 비밀번호 강제 변경 폼 카드 (초기 로그인용) -->
    <div id="change-card" class="auth-card force-change-border hidden">
        <div class="auth-header">
            <span class="auth-logo"><i class="fa-solid fa-shield-halved icon-warning"></i></span>
            <h2 class="auth-title title-warning">보안 변경 강제</h2>
            <p class="auth-subtitle subtitle-warning">초기 비밀번호(admin)를 사용 중입니다.<br>안전한 새 비밀번호를 설정해 주세요.</p>
        </div>

        <div id="change-error" class="error-message">
            <i class="fa-solid fa-circle-exclamation"></i> <span id="change-error-text">오류</span>
        </div>

        <form id="change-form" onsubmit="handleChangePassword(event)">
            <div class="form-group">
                <input type="password" id="new-password" class="form-control" placeholder="새 비밀번호 (4자리 이상)" required autocomplete="new-password">
                <i class="fa-solid fa-lock"></i>
            </div>
            <div class="form-group">
                <input type="password" id="confirm-password" class="form-control" placeholder="새 비밀번호 확인" required autocomplete="new-password">
                <i class="fa-solid fa-lock"></i>
            </div>
            <button type="submit" class="btn-submit btn-warning">
                비밀번호 변경 및 메인 이동 <i class="fa-solid fa-check"></i>
            </button>
        </form>
    </div>
</div>

<script src="/static/js/login.js"></script>
<script>
    // 페이지 로드 시 다국어 초기화 및 렌더링
    document.addEventListener('DOMContentLoaded', async () => {
        await i18n.init();
        i18n.translateDOM();
        i18n.renderLanguageSelector('#login-i18n-container');
    });
</script>
</body>
</html>
